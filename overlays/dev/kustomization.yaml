apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: dev
namePrefix: dev-

commonLabels:
  environment: dev

resources:
  - ../../base

replicas:
  - name: webapp
    count: 1

patches:
  - patch: |
      - op: add
        path: /spec/template/spec/containers/0/env
        value:
          - name: ENVIRONMENT
            value: "development"
    target:
      kind: Deployment
      name: webapp
